name: Build Android APK

on:
  push:
    branches:
      - main
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libffi-dev libssl-dev

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython==0.29.37

      - name: Build debug APK
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          TINFO_PKG=libtinfo5
          if ! apt-cache show "$TINFO_PKG" >/dev/null 2>&1; then
            TINFO_PKG=libtinfo6
          fi
          sudo apt-get install -y \
            ant git zip unzip autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev "$TINFO_PKG" cmake \
            libffi-dev libssl-dev

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install "cython<3" buildozer

      - name: Build APK
        run: buildozer -v android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrackYourExpense-debug-apk
          path: bin/*.apk
          if-no-files-found: error
